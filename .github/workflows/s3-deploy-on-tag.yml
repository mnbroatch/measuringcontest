name: Deploy to S3 on vX.X.X Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_S3_SYNC_ROLE_NAME: ${{ vars.AWS_S3_SYNC_ROLE_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:

      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build main app
        run: npm run build

      - name: Install docs dependencies
        run: cd documentation-vitepress && npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Copy docs into dist
        run: cp -r documentation-vitepress/docs/.vitepress/dist dist/docs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_S3_SYNC_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync files to S3
        run: aws s3 sync ./dist s3://${{ env.S3_BUCKET_NAME }} --delete

      - name: Upload docs redirect objects
        run: |
          aws s3 cp scripts/docs-redirect.html s3://${{ env.S3_BUCKET_NAME }}/docs --content-type "text/html"
          aws s3api put-object --bucket ${{ env.S3_BUCKET_NAME }} --key "docs/" --body scripts/docs-redirect.html --content-type "text/html"
